<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Toto Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 90%;
            max-width: 700px;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #d63031;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #636e72;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3436;
        }
        
        input {
            padding: 10px 15px;
            border: 2px solid #dfe6e9;
            border-radius: 6px;
            font-size: 16px;
            width: 100px;
        }
        
        input:focus {
            outline: none;
            border-color: #74b9ff;
        }
        
        button {
            background-color: #d63031;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            align-self: center;
        }
        
        button:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .results {
            margin-top: 30px;
        }
        
        .toto-set {
            margin-bottom: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        
        .set-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #dfe6e9;
        }
        
        .set-title {
            font-weight: 700;
            color: #2d3436;
            font-size: 1.1em;
        }
        
        .set-date {
            color: #636e72;
            font-size: 0.9em;
        }
        
        .toto-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .toto-ball {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d63031, #e17055);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        
        .toto-ball:hover {
            transform: scale(1.1);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .toto-ball {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Toto Number Generator</h1>
        <p class="subtitle">Generate your lucky numbers for the next draw</p>
        
        <div class="controls">
            <div class="control-group">
                <label for="numbersPerSet">System:</label>
                <input type="number" id="numbersPerSet" min="1" max="49" value="7">
            </div>
            
            <div class="control-group">
                <label for="numberOfSets">Set/s:</label>
                <input type="number" id="numberOfSets" min="1" max="20" value="5">
            </div>
        </div>
        
        <button id="generateBtn">Generate Numbers</button>
        
        <div class="results" id="resultsContainer">
            <!-- Results will be inserted here -->
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', function() {
            const max_toto = 49;
            const min_toto = 1;
            const input_toto = parseInt(document.getElementById('numbersPerSet').value);
            const input_quantity = parseInt(document.getElementById('numberOfSets').value);
            
            // Validate inputs
            if (input_toto < 1 || input_toto > 49) {
                alert('Please enter between 1 and 49 numbers per set');
                return;
            }
            
            if (input_quantity < 1 || input_quantity > 20) {
                alert('Please generate between 1 and 20 sets');
                return;
            }
            
            let final = [];
            
            function generateToto(input_toto) {
                let new_number_toto = [];
                while(new_number_toto.length < input_toto) {
                    let random = Math.floor(Math.random() * max_toto) + min_toto;
                    if(!new_number_toto.includes(random)) {
                        new_number_toto.push(random);
                    }
                }
                return new_number_toto.sort((a, b) => a - b);
            }
            
            for(let i = 0; i < input_quantity; i++) {
                final.push(generateToto(input_toto));
            }
            
            // Display results
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '';
            
            if (final.length === 0) {
                resultsContainer.innerHTML = '<p>No numbers generated yet</p>';
                return;
            }
            
            final.forEach((set, index) => {
                const setElement = document.createElement('div');
                setElement.className = 'toto-set';
                
                const setHeader = document.createElement('div');
                setHeader.className = 'set-header';
                
                const setTitle = document.createElement('div');
                setTitle.className = 'set-title';
                setTitle.textContent = `Set ${index + 1}`;
                
                const today = new Date();
                const setDate = document.createElement('div');
                setDate.className = 'set-date';
                setDate.textContent = today.toLocaleDateString();
                
                setHeader.appendChild(setTitle);
                setHeader.appendChild(setDate);
                
                const numbersContainer = document.createElement('div');
                numbersContainer.className = 'toto-numbers';
                
                set.forEach(number => {
                    const ball = document.createElement('div');
                    ball.className = 'toto-ball';
                    ball.textContent = number;
                    numbersContainer.appendChild(ball);
                });
                
                setElement.appendChild(setHeader);
                setElement.appendChild(numbersContainer);
                resultsContainer.appendChild(setElement);
            });
        });
        
        // Generate initial set on page load
        document.getElementById('generateBtn').click();
    </script>
</body>
</html>
